<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Inventario</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ffffff"
        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="17" y1="11" x2="23" y2="11"/>
      </svg>
    </div>
  </div>

  <h2>Crear cuenta</h2>
  <p class="subtitle">Regístrate para acceder al sistema</p>

  <div class="field">
    <label for="nombre">Nombre completo</label>
    <div class="input-wrap">
      <input type="text" id="nombre" placeholder="Tu nombre">
    </div>
  </div>

  <div class="field">
    <label for="email">Correo electrónico</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="correo@empresa.com">
    </div>
  </div>

  <div class="field">
    <label for="password">Contraseña</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="••••••••">
    </div>
  </div>

  <button class="btn-login" onclick="registrar()">
    Registrarse
  </button>

  <p id="mensaje"></p>

  <div class="forgot" style="text-align: center; margin-top: 15px;">
    <a href="login.html">¿Ya tienes cuenta? Inicia sesión aquí</a>
  </div>

</div>

<script src="registro.js"></script>
</body>
</html>
